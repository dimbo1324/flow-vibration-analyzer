name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  quality:
    name: Quality checks (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # 3.11/3.12 — объявленный минимальный таргет;
        # 3.13 проверяет совместимость с NumPy 2.x / pandas 2.x.
        python-version: ["3.11", "3.12", "3.13"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install development dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements-dev.txt

      - name: Install security scanning tools
        run: |
          python -m pip install bandit pip-audit

      - name: Install web/API dependencies
        run: |
          python -m pip install -r requirements-web.txt

      - name: Verify web dependencies
        run: |
          python -c "import fastapi; import uvicorn; import httpx; print('web deps ok')"

      - name: Install Linux Qt runtime dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libegl1 \
            libgl1 \
            libgl1-mesa-dri \
            libopengl0 \
            libegl-mesa0 \
            libxkbcommon-x11-0 \
            libxcb-cursor0 \
            libxcb-icccm4 \
            libxcb-image0 \
            libxcb-keysyms1 \
            libxcb-randr0 \
            libxcb-render-util0 \
            libxcb-shape0 \
            libxcb-xfixes0 \
            libxcb-xinerama0 \
            libxcb1 \
            libx11-6 \
            libx11-xcb1 \
            libxext6 \
            libxrender1 \
            libxi6 \
            libxcomposite1 \
            libxdamage1 \
            libxrandr2 \
            libxtst6 \
            libdbus-1-3 \
            libfontconfig1 \
            libfreetype6 \
            libnss3 \
            libxss1

      - name: Verify PySide6 UI imports
        env:
          QT_QPA_PLATFORM: offscreen
          QT_OPENGL: software
          MPLBACKEND: Agg
        run: |
          python -c "from PySide6.QtWidgets import QApplication; print('PySide6 QtWidgets import OK')"
          python -c "import iva.ui.main_window; print('IVA main_window import OK')"

      - name: CLI help
        run: python -m iva.cli.main --help

      - name: Compile check
        run: python -m compileall main.py iva tests scripts -q

      - name: pytest with coverage
        env:
          QT_QPA_PLATFORM: offscreen
          QT_OPENGL: software
          MPLBACKEND: Agg
        run: python -m pytest --cov=iva/core --cov-report=term-missing --cov-fail-under=80 -m "not performance"

      - name: black (format check)
        run: python -m black --check .

      - name: ruff (lint)
        run: python -m ruff check .

      - name: mypy (core models)
        run: python -m mypy iva/core/models

      - name: mypy (ui package)
        run: python -m mypy iva/ui

      - name: mypy (full package)
        run: python -m mypy iva main.py

      - name: mypy (api layer — strict untyped defs)
        run: python -m mypy iva/api

      - name: bandit (security lint)
        run: python -m bandit -r iva -ll -q --exclude iva/ui

      - name: pip-audit (dependency CVEs)
        run: python -m pip_audit -r requirements.txt -r requirements-web.txt

      - name: Upload out/ on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: iva-out-${{ matrix.python-version }}-${{ github.run_id }}
          path: out/
          if-no-files-found: ignore

  frontend:
    name: Frontend checks
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          # pnpm 11 requires Node.js >= 22.13; use LTS 22.x.
          node-version: "22"

      - name: Enable Corepack
        run: corepack enable

      - name: Install frontend dependencies
        working-directory: web/frontend
        run: pnpm install --frozen-lockfile

      - name: TypeScript typecheck
        working-directory: web/frontend
        run: pnpm typecheck

      - name: ESLint
        working-directory: web/frontend
        run: pnpm lint

      - name: Vitest tests
        working-directory: web/frontend
        run: pnpm test --run

      - name: Frontend coverage
        working-directory: web/frontend
        run: pnpm coverage --run

      - name: Check frontend coverage threshold (≥60% lines)
        run: |
          node -e "
            const s = require('./web/frontend/coverage/coverage-summary.json');
            const pct = s.total.lines.pct;
            console.log('Frontend line coverage:', pct + '%');
            if (pct < 60) { console.error('Coverage below 60% threshold'); process.exit(1); }
          "

      - name: Production build
        working-directory: web/frontend
        run: pnpm build
