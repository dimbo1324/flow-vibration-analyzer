name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  quality:
    name: Quality checks (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # 3.11/3.12 cover the declared minimum target; 3.13 exercises the
        # NumPy 2.x / pandas 2.x era so newer-major behaviour is tested in CI.
        python-version: ["3.11", "3.12", "3.13"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install development dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements-dev.txt

      - name: Smoke test
        run: python main.py

      - name: CLI help
        run: python -m iva.cli.main --help

      - name: Compile check
        run: python -m compileall main.py iva tests scripts -q

      - name: pytest
        run: python -m pytest

      - name: black (format check)
        run: python -m black --check .

      - name: ruff (lint)
        run: python -m ruff check .

      - name: mypy (core models)
        run: python -m mypy iva/core/models

      - name: mypy (full package)
        run: python -m mypy iva main.py

      - name: Upload out/ on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: iva-out-${{ matrix.python-version }}-${{ github.run_id }}
          path: out/
          if-no-files-found: ignore
