repos:
  - repo: local
    hooks:
      - id: trailing-whitespace
        name: trailing whitespace
        language: system
        entry: python scripts/strip_trailing_whitespace.py
        types: [text]
        exclude: '\.spec$|\.iss$'

      - id: black
        name: black (format)
        language: system
        entry: python -m black
        args: ['--line-length=100']
        types: [python]

      - id: ruff-fix
        name: ruff (auto-fix)
        language: system
        entry: python -m ruff check --fix
        types: [python]

      - id: ruff-check
        name: ruff (check)
        language: system
        entry: python -m ruff check
        types: [python]

      - id: mypy
        name: mypy (type check)
        language: system
        entry: python -m mypy
        args: ['--ignore-missing-imports', 'iva', 'main.py']
        pass_filenames: false
        types: [python]
